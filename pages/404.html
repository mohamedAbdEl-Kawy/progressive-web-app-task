<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - ITI PWA</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="image/png" href="../img/logo.jpg">
</head>

<body>

    <main class="container">
        <section class="error-page">
            <div class="error-content">
                <h1>404 - Page Not Found</h1>
                <p>Sorry, the page you're looking for doesn't exist or has been moved.</p>

                <div class="error-details">
                    <h3>This could happen because:</h3>
                    <ul>
                        <li>The page URL is incorrect</li>
                        <li>The page has been deleted or moved</li>
                        <li>There's a typo in the address</li>
                    </ul>
                </div>

                <div class="action-buttons">
                    <a href="../index.html" class="btn-primary">Back to Home</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 ITI PWA Task D01.</p>
    </footer>
</body>

</html>
