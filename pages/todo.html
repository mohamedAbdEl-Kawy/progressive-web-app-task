<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/png" href="../img/logo.jpg">
    <title>To Do List - ITI PWA</title>
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="../img/logo.jpg" alt="">
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="./about.html">About</a></li>
                <li><a href="./contact.html">Contact</a></li>
                <li><a href="./todo.html" class="active">To Do List</a></li>
            </ul>
            <button id="installBtn" class="install-btn" style="display: none;">
                📥 Install App
            </button>
        </div>
    </nav>

    <main class="container">
        <div class="todo-wrapper">
            <h1>My To Do List</h1>

            <form id="taskForm" class="task-form">
                <div class="form-group">
                    <label for="tname">Task Name</label>
                    <input type="text" name="taskName" id="tname" placeholder="Enter task name..." required />
                </div>

                <div class="form-group">
                    <label for="tdate">Due Date & Time</label>
                    <input type="datetime-local" name="taskDeadline" id="tdate" required />
                </div>

                <input type="submit" value="Add Task" class="btn-primary" />
            </form>

            <div id="tasks" class="tasks-container"></div>
        </div>
    </main>

    <script src="../idb.js"></script>
    <script src="../js/script.js"></script>
</body>

</html>
